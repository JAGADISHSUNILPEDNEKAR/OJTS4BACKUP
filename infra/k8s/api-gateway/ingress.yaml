apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: origin-api-gateway
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # TLS termination
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # WAF Rules via ModSecurity
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    # mTLS configurations for internal routing
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-secret: "default/mtls-ca-secret"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
    # Rate limiting to prevent DDoS
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - api.origin.app
      secretName: origin-tls-secret
  rules:
    - host: api.origin.app
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80
          - path: /api/v1/shipments
            pathType: Prefix
            backend:
              service:
                name: shipment-service
                port:
                  number: 80
          - path: /api/v1/iot
            pathType: Prefix
            backend:
              service:
                name: iot-ingestion-service
                port:
                  number: 80
