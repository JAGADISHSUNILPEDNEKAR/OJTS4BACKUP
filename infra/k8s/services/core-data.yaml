# Shipment Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-service
  labels:
    app: shipment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipment-service
  template:
    metadata:
      labels:
        app: shipment-service
    spec:
      containers:
      - name: shipment-service
        image: origin-staging-shipment-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: origin-shared-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: origin-db-secrets
              key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-service
spec:
  selector:
    app: shipment-service
  ports:
  - port: 80
    targetPort: 8000

---
# IoT Ingestion Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-ingestion-service
  labels:
    app: iot-ingestion-service
spec:
  # IoT needs high availability to absorb traffic gracefully
  replicas: 3
  selector:
    matchLabels:
      app: iot-ingestion-service
  template:
    metadata:
      labels:
        app: iot-ingestion-service
    spec:
      containers:
      - name: iot-ingestion-service
        image: origin-staging-iot-ingestion-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: origin-shared-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: origin-db-secrets
              key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: iot-ingestion-service
spec:
  selector:
    app: iot-ingestion-service
  ports:
  - port: 80
    targetPort: 8000
