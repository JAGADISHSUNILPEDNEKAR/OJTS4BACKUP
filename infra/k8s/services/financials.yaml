---
# Crypto Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-service
  labels:
    app: crypto-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: crypto-service
  template:
    metadata:
      labels:
        app: crypto-service
    spec:
      containers:
      - name: crypto-service
        image: origin-staging-crypto-service:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: origin-shared-config
        env:
        - name: BITCOIN_RPC_URL
          valueFrom:
            secretKeyRef:
              name: origin-bitcoin-secrets
              key: rpc-url
        - name: BITCOIN_RPC_USER
          valueFrom:
            secretKeyRef:
              name: origin-bitcoin-secrets
              key: rpc-user
        - name: BITCOIN_RPC_PASS
          valueFrom:
            secretKeyRef:
              name: origin-bitcoin-secrets
              key: rpc-pass
