# Escrow Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: escrow-service
  labels:
    app: escrow-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escrow-service
  template:
    metadata:
      labels:
        app: escrow-service
    spec:
      containers:
      - name: escrow-service
        image: origin-staging-escrow-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: origin-shared-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: origin-db-secrets
              key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: escrow-service
spec:
  selector:
    app: escrow-service
  ports:
  - port: 80
    targetPort: 8000

